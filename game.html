<!DOCTYPE html>
<html>
<head>
<title>Abhishek Racing Game</title>

<style>
body{
    margin:0;
    background:#222;
    text-align:center;
    font-family:Arial;
}

h1{
    color:white;
}

#road{
    width:400px;
    height:600px;
    background:gray;
    margin:auto;
    position:relative;
    overflow:hidden;
    border-left:5px solid white;
    border-right:5px solid white;
}

#car{
    width:60px;
    height:100px;
    background:red;
    position:absolute;
    bottom:20px;
    left:170px;
    border-radius:10px;
}

button{
    margin:10px;
    padding:15px 30px;
    font-size:20px;
}
</style>

</head>
<body>

<h1>🏎️ Racing Game</h1>

<div id="road">
    <div id="car"></div>
</div>

<br>

<button onclick="moveLeft()">⬅ Left</button>
<button onclick="moveRight()">Right ➡</button>

<script>

let car = document.getElementById("car");
let position = 170;

function moveLeft(){
    position -= 20;

    if(position < 0){
        position = 0;
    }

    car.style.left = position + "px";
}

function moveRight(){
    position += 20;

    if(position > 340){
        position = 340;
    }

    car.style.left = position + "px";
}

document.addEventListener("keydown", function(e){

    if(e.key === "ArrowLeft"){
        moveLeft();
    }

    if(e.key === "ArrowRight"){
        moveRight();
    }

});

</script>

</body>
</html>
