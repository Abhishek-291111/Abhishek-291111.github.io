<!DOCTYPE html>
<html>
<head>
<title>Zombie Shooter</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#222;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    cursor:crosshair;
}

.zombie{
    width:80px;
    height:80px;
    background:green;
    border-radius:10px;
    position:absolute;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:30px;
    z-index:1000;
}
</style>

</head>
<body>

<div id="score">Score: 0</div>
<div id="game"></div>

<script>

let score = 0;

const game =
document.getElementById("game");

const scoreText =
document.getElementById("score");

function createZombie(){

let zombie =
document.createElement("div");

zombie.classList.add("zombie");

zombie.style.left =
Math.random() *
(window.innerWidth-100)
+ "px";

zombie.style.top =
Math.random() *
(window.innerHeight-100)
+ "px";

zombie.onclick = function(){

score++;

scoreText.innerHTML =
"Score: " + score;

zombie.remove();

createZombie();
};

game.appendChild(zombie);
}

for(let i=0;i<5;i++){
createZombie();
}

</script>

</body>
</html>
