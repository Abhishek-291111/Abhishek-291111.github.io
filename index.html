<!DOCTYPE html>
<html>
<head>
    <title>Abhishek Games</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#121212;
            color:white;
        }

        header{
            background:#1f1f1f;
            padding:20px;
            text-align:center;
        }

        h1{
            margin:0;
        }

        .search{
            text-align:center;
            margin:20px;
        }

        .search input{
            width:300px;
            padding:10px;
            border-radius:20px;
            border:none;
        }

        .games{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .card{
            width:250px;
            background:#222;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
            text-align:center;
        }

        .card:hover{
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            height:150px;
            object-fit:cover;
        }

        .card a{
            display:block;
            padding:15px;
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        footer{
            text-align:center;
            padding:20px;
            background:#1f1f1f;
        }
    </style>
</head>
<body>

<header>
    <h1>🎮 Abhishek Games</h1>
    <p>Play Amazing Games Online</p>
</header>

<div class="search">
    <input type="text" placeholder="Search games...">
</div>

<div class="games">

    <div class="card">
        <img src="https://picsum.photos/250/150?1">
        <a href="game.html">🏎️ Racing Game</a>
    </div>

    <div class="card">
        <img src="https://picsum.photos/250/150?2">
        <a href="zombie.html">🧟 Zombie Shooter</a>
    </div>

    <div class="card">
        <img src="https://picsum.photos/250/150?3">
        <a href="#">⚔️ Action Game</a>
    </div>

    <div class="card">
        <img src="https://picsum.photos/250/150?4">
        <a href="#">🧩 Puzzle Game</a>
    </div>

</div>

<footer>
    © 2026 Abhishek Games
</footer>

</body>
</html>
