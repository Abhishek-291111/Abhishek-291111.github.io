<!DOCTYPE html>
<html>
<head>
<title>Abhishek Racing</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#222;
    font-family:Arial;
}

#score{
    color:white;
    text-align:center;
    font-size:30px;
    padding:10px;
}

#gameArea{
    width:400px;
    height:700px;
    background:#555;
    margin:auto;
    overflow:hidden;
    position:relative;
    border-left:8px solid white;
    border-right:8px solid white;
}

.car{
    width:50px;
    height:90px;
    position:absolute;
    bottom:20px;
    left:175px;
    font-size:60px;
}

.enemy{
    width:50px;
    height:90px;
    position:absolute;
    font-size:60px;
}

.line{
    width:10px;
    height:100px;
    background:white;
    position:absolute;
    left:195px;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>

<div id="gameArea">
<div id="player" class="car">🏎️</div>
</div>

<script>

const gameArea =
document.getElementById("gameArea");

const player =
document.getElementById("player");

const scoreDisplay =
document.getElementById("score");

let score = 0;
let gameOver = false;

let playerX = 175;

const keys = {
ArrowLeft:false,
ArrowRight:false
};

document.addEventListener("keydown",e=>{
if(keys.hasOwnProperty(e.key))
keys[e.key]=true;
});

document.addEventListener("keyup",e=>{
if(keys.hasOwnProperty(e.key))
keys[e.key]=false;
});

for(let i=0;i<6;i++){
let line=document.createElement("div");
line.classList.add("line");
line.style.top=(i*120)+"px";
gameArea.appendChild(line);
}

function createEnemy(){

let enemy =
document.createElement("div");

enemy.classList.add("enemy");

enemy.innerHTML="🚗";

enemy.style.left=
Math.floor(Math.random()*320)+"px";

enemy.style.top="-100px";

gameArea.appendChild(enemy);
}

for(let i=0;i<3;i++){
createEnemy();
}

function moveLines(){

document.querySelectorAll(".line")
.forEach(line=>{

let top=
parseInt(line.style.top);

top += 8;

if(top>700)
top=-100;

line.style.top=top+"px";
});
}

function moveEnemies(){

document.querySelectorAll(".enemy")
.forEach(enemy=>{

let top=
parseInt(enemy.style.top);

top += 6;

if(top>700){

enemy.style.top="-100px";

enemy.style.left=
Math.floor(Math.random()*320)
+"px";

score++;

scoreDisplay.innerHTML=
"Score: "+score;
}

enemy.style.top=top+"px";

let pRect=
player.getBoundingClientRect();

let eRect=
enemy.getBoundingClientRect();

if(
pRect.left<eRect.right &&
pRect.right>eRect.left &&
pRect.top<eRect.bottom &&
pRect.bottom>eRect.top
){
gameOver=true;
alert(
"Game Over! Score: "
+score
);
location.reload();
}
});
}

function gameLoop(){

if(gameOver) return;

if(keys.ArrowLeft &&
playerX>0)
playerX-=6;

if(keys.ArrowRight &&
playerX<340)
playerX+=6;

player.style.left=
playerX+"px";

moveLines();
moveEnemies();

requestAnimationFrame(gameLoop);
}

gameLoop();

</script>

</body>
</html>
